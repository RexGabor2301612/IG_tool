services:
  - type: web
    name: ig-tool
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 900 --graceful-timeout 60
    envVars:
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PLAYWRIGHT_AUTO_INSTALL
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
